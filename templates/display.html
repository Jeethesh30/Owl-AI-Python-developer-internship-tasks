<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl AI - Display</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%);
            min-height: 100vh;
        }
        .display-card {
            background: #fff;
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 2.5rem 2rem;
            max-width: 480px;
            margin: 3rem auto;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .display-title {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1.5rem;
        }
        .alert-info {
            font-size: 1.1rem;
            border-radius: 1rem;
        }
        .btn-custom {
            background: linear-gradient(90deg, #2563eb 0%, #38bdf8 100%);
            color: #fff;
            border: none;
            font-weight: 600;
            transition: box-shadow 0.2s;
        }
        .btn-custom:hover {
            box-shadow: 0 4px 16px 0 rgba(56, 189, 248, 0.2);
        }
        .navbar {
            border-radius: 0 0 1rem 1rem;
        }
        .fa-arrow-left {
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">🦉 Owl AI</a>
        </div>
    </nav>
    <div class="display-card">
        <h2 class="display-title text-center">Display Page</h2>
        <div class="alert alert-info text-center">
            <strong>Your input:</strong> {{ value }}
        </div>
        <div class="d-grid gap-2">
            <a href="/input" class="btn btn-custom btn-lg"><i class="fa fa-arrow-left"></i>Back to Input</a>
        </div>
    </div>
</body>
</html>
