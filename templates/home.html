<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owl AI - Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(120deg, #f0f4ff 0%, #e0f7fa 100%);
            min-height: 100vh;
        }
        .welcome-card {
            background: #fff;
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            padding: 3rem 2.5rem;
            max-width: 600px;
            margin: 5rem auto 0 auto;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1e293b;
        }
        .welcome-lead {
            color: #475569;
            font-size: 1.25rem;
            margin-bottom: 2rem;
        }
        .btn-custom {
            background: linear-gradient(90deg, #2563eb 0%, #38bdf8 100%);
            color: #fff;
            border: none;
            font-weight: 600;
            transition: box-shadow 0.2s;
        }
        .btn-custom:hover {
            box-shadow: 0 4px 16px 0 rgba(56, 189, 248, 0.2);
        }
        .navbar {
            border-radius: 0 0 1rem 1rem;
        }
        .fa-robot {
            color: #2563eb;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">🦉 Owl AI</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/input"><i class="fa fa-robot"></i>Input</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="welcome-card text-center">
        <div class="welcome-title mb-3">Welcome to Owl AI</div>
        <div class="welcome-lead">A simple and interactive web interface for AI-powered text summarization.</div>
        <a href="/input" class="btn btn-custom btn-lg"><i class="fa fa-magic"></i> Go to Input Page</a>
    </div>
</body>
</html>
